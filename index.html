<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIdent 3.0 | DeBERTa-v3 Browser AI Detector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #030303;
            color: #ffffff;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .ai-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }
        .loader {
            border-top-color: #a855f7;
            animation: spinner 0.6s linear infinite;
        }
        @keyframes spinner {
            to {transform: rotate(360deg);}
        }
        /* Прогресс-бар загрузки модели */
        #modelProgress {
            transition: width 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="fixed top-0 left-1/2 -translate-x-1/2 w-full max-w-4xl h-64 bg-purple-600/20 blur-[120px] -z-10"></div>

    <div class="w-full max-w-5xl">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-extrabold tracking-tight mb-3">AIdent <span class="text-purple-500 italic">3.0</span></h1>
            <p class="text-gray-400">Модель: <code class="bg-gray-800 px-2 py-1 rounded text-xs">DeBERTa-v3-Small (Local Inference)</code></p>
            
            <div id="loadingOverlay" class="mt-4 max-w-xs mx-auto hidden">
                <p class="text-[10px] text-gray-500 mb-1 uppercase tracking-widest">Загрузка весов модели в кэш...</p>
                <div class="w-full bg-gray-900 rounded-full h-1.5">
                    <div id="modelProgress" class="bg-purple-500 h-1.5 rounded-full" style="width: 0%"></div>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-4">
                <div class="glass-panel p-2 rounded-3xl">
                    <textarea id="userInput" 
                        class="w-full h-80 bg-transparent p-6 text-lg outline-none resize-none placeholder:text-gray-700 font-light"
                        placeholder="Вставьте английский текст для анализа..."></textarea>
                </div>
                
                <button id="checkBtn" 
                    class="w-full ai-gradient py-4 rounded-2xl font-bold text-lg hover:opacity-90 transition-all transform active:scale-[0.98] shadow-[0_0_30px_rgba(168,85,247,0.3)] flex justify-center items-center gap-3">
                    <span id="btnText">Инициализация модели...</span>
                    <div id="btnLoader" class="loader w-5 h-5 border-2 border-white/20 rounded-full hidden"></div>
                </button>
            </div>

            <div class="lg:col-span-1">
                <div id="resultCard" class="glass-panel p-8 rounded-3xl h-full flex flex-col justify-center items-center text-center opacity-40 transition-all duration-500">
                    <div id="statusLabel" class="text-xs uppercase tracking-widest text-gray-500 mb-4">Ожидание текста</div>
                    
                    <div class="relative w-40 h-40 mb-6">
                        <svg class="w-full h-full -rotate-90" viewBox="0 0 36 36">
                            <circle cx="18" cy="18" r="16" fill="none" class="stroke-gray-800" stroke-width="3"></circle>
                            <circle id="scoreCircle" cx="18" cy="18" r="16" fill="none" class="stroke-purple-500 transition-all duration-1000" 
                                stroke-width="3" stroke-dasharray="0 100" stroke-linecap="round"></circle>
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <span id="scoreText" class="text-4xl font-black">0%</span>
                        </div>
                    </div>

                    <div id="verdict" class="text-xl font-bold mb-4 italic">--</div>
                    
                    <div class="w-full space-y-3 pt-6 border-t border-white/5">
                        <div class="flex justify-between text-xs">
                            <span class="text-gray-500">Confidence Score:</span>
                            <span id="aiScore" class="text-gray-300">0%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // Импортируем Transformers.js через CDN
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

        // Отключаем поиск локальных моделей, используем только удаленные (HuggingFace)
        env.allowLocalModels = false;

        const MODEL_NAME = 'Xenova/deberta-v3-small-zeroshot-v2-binary'; // Оптимизированная версия для веба

        let detector;
        const checkBtn = document.getElementById('checkBtn');
        const userInput = document.getElementById('userInput');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');
        const modelProgress = document.getElementById('modelProgress');
        const loadingOverlay = document.getElementById('loadingOverlay');

        // 1. Инициализация модели при загрузке страницы
        async function initModel() {
            try {
                loadingOverlay.classList.remove('hidden');
                detector = await pipeline('text-classification', MODEL_NAME, {
                    progress_callback: (data) => {
                        if (data.status === 'progress') {
                            modelProgress.style.width = `${data.progress}%`;
                        }
                    }
                });
                btnText.innerText = "Проверить на ИИ";
                loadingOverlay.classList.add('hidden');
                checkBtn.disabled = false;
            } catch (e) {
                console.error(e);
                btnText.innerText = "Ошибка загрузки";
            }
        }

        initModel();

        // 2. Логика анализа
        checkBtn.addEventListener('click', async () => {
            const text = userInput.value.trim();
            if (text.length < 20) {
                alert("Введите хотя бы 20 символов.");
                return;
            }

            btnText.innerText = "Нейронный анализ...";
            btnLoader.classList.remove('hidden');
            checkBtn.disabled = true;
            document.getElementById('resultCard').style.opacity = "1";

            try {
                // Прямой вызов модели в браузере
                const output = await detector(text);
                
                // Transformers.js возвращает массив [{label: '...', score: ...}]
                const result = output[0];
                const isAI = result.label.toLowerCase().includes('label_1') || result.label.toLowerCase().includes('fake') || result.label.toLowerCase().includes('ai');
                const score = (result.score * 100).toFixed(1);

                // UI Update
                updateUI(isAI, score);

            } catch (error) {
                console.error(error);
                alert("Ошибка при анализе: " + error.message);
            } finally {
                btnText.innerText = "Проверить на ИИ";
                btnLoader.classList.add('hidden');
                checkBtn.disabled = false;
            }
        });

        function updateUI(isAI, score) {
            const scoreCircle = document.getElementById('scoreCircle');
            const verdict = document.getElementById('verdict');
            const scoreText = document.getElementById('scoreText');
            const aiScoreLabel = document.getElementById('aiScore');

            scoreText.innerText = score + "%";
            aiScoreLabel.innerText = score + "%";
            scoreCircle.setAttribute('stroke-dasharray', `${score} 100`);

            // Сбрасываем цвета
            scoreCircle.classList.remove('stroke-green-500', 'stroke-yellow-500', 'stroke-red-500', 'stroke-purple-500');

            if (isAI && score > 70) {
                verdict.innerText = "🚨 Сгенерировано ИИ";
                verdict.className = "text-xl font-bold mb-4 italic text-red-500";
                scoreCircle.classList.add('stroke-red-500');
            } else if (isAI || score > 40) {
                verdict.innerText = "⚠️ Подозрительный текст";
                verdict.className = "text-xl font-bold mb-4 italic text-yellow-500";
                scoreCircle.classList.add('stroke-yellow-500');
            } else {
                verdict.innerText = "✅ Написано человеком";
                verdict.className = "text-xl font-bold mb-4 italic text-green-500";
                scoreCircle.classList.add('stroke-green-500');
            }
            document.getElementById('statusLabel').innerText = "Анализ завершен";
        }
    </script>
</body>
</html>
