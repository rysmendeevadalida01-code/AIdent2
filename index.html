<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIdent | Анализ текста</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: #ffffff; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .accent-gradient { background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%); }
        .loader { border-top-color: #c084fc; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-slate-200">

    <div class="fixed top-0 left-1/2 -translate-x-1/2 w-full max-w-5xl h-[500px] bg-indigo-500/10 blur-[120px] -z-10"></div>

    <div class="w-full max-w-4xl">
        <header class="text-center mb-10">
            <h1 class="text-6xl font-extrabold tracking-tighter mb-2 bg-clip-text text-transparent bg-gradient-to-b from-white to-slate-500">
                AIdent
            </h1>
            <p id="statusText" class="text-slate-500 text-sm font-light">Инициализация модулей...</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-8 space-y-4">
                <div class="glass p-1 rounded-3xl">
                    <textarea id="inputText" 
                        class="w-full h-72 bg-transparent p-6 text-lg outline-none resize-none placeholder:text-slate-700 font-light"
                        placeholder="Введите английский текст для проверки..."></textarea>
                </div>
                
                <button id="runBtn" disabled
                    class="w-full accent-gradient py-5 rounded-2xl font-bold text-lg shadow-xl shadow-indigo-500/10 hover:brightness-110 active:scale-[0.99] transition-all disabled:opacity-30 disabled:cursor-not-allowed flex justify-center items-center gap-3">
                    <span id="btnLabel">Загрузка Transformers.js...</span>
                    <div id="loader" class="loader w-5 h-5 border-2 border-white/10 rounded-full hidden"></div>
                </button>
            </div>

            <div class="lg:col-span-4">
                <div id="resPanel" class="glass p-8 rounded-3xl h-full flex flex-col items-center justify-center text-center opacity-30 transition-opacity duration-500">
                    <div class="text-[10px] uppercase tracking-[0.2em] text-slate-500 mb-6">Результат анализа</div>
                    <div id="percent" class="text-6xl font-black mb-4 text-white">0%</div>
                    <div id="verdict" class="text-sm font-medium px-4 py-1 rounded-full bg-white/5 text-slate-400 italic">Ожидание данных</div>
                </div>
            </div>
        </div>
        
        <div id="errorLog" class="hidden mt-6 p-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-red-400 text-xs text-center"></div>
    </div>

    <script type="module">
        // Используем последнюю стабильную версию Transformers.js
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

        // Настройки окружения для предотвращения ошибок доступа
        env.allowLocalModels = false;
        env.useBrowserCache = true;
        
        // Модель DeBERTa-v3-small, портированная для Transformers.js
        const MODEL = 'Xenova/deberta-v3-small'; 
        // Примечание: для детекции ИИ лучше всего подходит Xenova/roberta-base-openai-detector
        // Но если нужна именно DeBERTa-v3-small, используем её (как классификатор)
        const ALT_MODEL = 'Xenova/roberta-base-openai-detector'; 

        let classifier;
        const btn = document.getElementById('runBtn');
        const btnLabel = document.getElementById('btnLabel');
        const status = document.getElementById('statusText');
        const errorLog = document.getElementById('errorLog');

        async function loadModel() {
            try {
                status.innerText = "Устанавливаем соединение с Hugging Face...";
                
                // Создаем пайплайн классификации
                classifier = await pipeline('text-classification', ALT_MODEL, {
                    progress_callback: (p) => {
                        if (p.status === 'progress') {
                            btnLabel.innerText = `Загрузка: ${Math.round(p.progress)}%`;
                        }
                    }
                });

                status.innerText = "AIdent готов к работе";
                btnLabel.innerText = "Проверить текст";
                btn.disabled = false;
            } catch (err) {
                console.error(err);
                errorLog.innerText = "Ошибка доступа: " + err.message + ". Попробуйте использовать VPN или локальный сервер.";
                errorLog.classList.remove('hidden');
                btnLabel.innerText = "Ошибка загрузки";
            }
        }

        btn.onclick = async () => {
            const text = document.getElementById('inputText').value.trim();
            if (text.length < 20) return alert("Текст слишком короткий для анализа.");

            btn.disabled = true;
            document.getElementById('loader').classList.remove('hidden');
            btnLabel.innerText = "Нейросети думают...";

            try {
                const output = await classifier(text);
                const result = output[0];
                
                // Логика: если модель обучена на Fake/Real (как roberta-detector)
                const isAI = result.label === 'Fake' || result.label === 'LABEL_1';
                const score = Math.round(result.score * 100);

                const resPanel = document.getElementById('resPanel');
                const percent = document.getElementById('percent');
                const verdict = document.getElementById('verdict');

                resPanel.style.opacity = "1";
                percent.innerText = score + "%";
                
                if (isAI && score > 60) {
                    verdict.innerText = "Вероятно ИИ";
                    verdict.className = "text-sm font-bold px-4 py-1 rounded-full bg-red-500/20 text-red-400";
                } else if (isAI || score > 35) {
                    verdict.innerText = "Подозрительно";
                    verdict.className = "text-sm font-bold px-4 py-1 rounded-full bg-yellow-500/20 text-yellow-400";
                } else {
                    verdict.innerText = "Написано человеком";
                    verdict.className = "text-sm font-bold px-4 py-1 rounded-full bg-green-500/20 text-green-400";
                }

            } catch (e) {
                alert("Ошибка во время анализа: " + e.message);
            } finally {
                btn.disabled = false;
                document.getElementById('loader').classList.add('hidden');
                btnLabel.innerText = "Проверить текст";
            }
        };

        loadModel();
    </script>
</body>
</html>
