<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIdent 3.0 | DeBERTa Local</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030303; color: #ffffff; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .ai-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .loader { border-top-color: #a855f7; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { to {transform: rotate(360deg);} }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="fixed top-0 left-1/2 -translate-x-1/2 w-full max-w-4xl h-64 bg-purple-600/20 blur-[120px] -z-10"></div>

    <div class="w-full max-w-5xl">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-extrabold tracking-tight mb-3">AIdent <span class="text-purple-500 italic">3.0</span></h1>
            <p id="modelStatus" class="text-gray-400 text-sm">Инициализация...</p>
        </header>

        <div id="protocolWarning" class="hidden mb-6 p-4 bg-amber-500/20 border border-amber-500/50 rounded-2xl text-amber-200 text-center text-sm">
            ⚠️ Похоже, вы открыли файл напрямую. Используйте локальный сервер (Live Server), иначе модель не загрузится.
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-4">
                <div class="glass-panel p-2 rounded-3xl">
                    <textarea id="userInput" 
                        class="w-full h-80 bg-transparent p-6 text-lg outline-none resize-none placeholder:text-gray-700 font-light"
                        placeholder="Вставьте английский текст для анализа..."></textarea>
                </div>
                
                <button id="checkBtn" disabled
                    class="w-full ai-gradient py-4 rounded-2xl font-bold text-lg opacity-50 cursor-not-allowed transition-all flex justify-center items-center gap-3">
                    <span id="btnText">Загрузка модели...</span>
                    <div id="btnLoader" class="loader w-5 h-5 border-2 border-white/20 rounded-full hidden"></div>
                </button>
            </div>

            <div class="lg:col-span-1">
                <div id="resultCard" class="glass-panel p-8 rounded-3xl h-full flex flex-col justify-center items-center text-center opacity-40">
                    <div id="scoreText" class="text-5xl font-black mb-2">0%</div>
                    <div id="verdict" class="text-lg font-medium text-gray-400 italic">Ожидание анализа</div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

        // Настройка путей
        env.allowLocalModels = false;
        env.useBrowserCache = true;

        const MODEL_ID = 'Xenova/roberta-base-openai-detector'; // Стабильная модель детектора
        let detector = null;

        const checkBtn = document.getElementById('checkBtn');
        const btnText = document.getElementById('btnText');
        const modelStatus = document.getElementById('modelStatus');

        // Проверка на запуск через file://
        if (window.location.protocol === 'file:') {
            document.getElementById('protocolWarning').classList.remove('hidden');
        }

        async function init() {
            try {
                modelStatus.innerText = "Скачивание модели (около 40MB)...";
                
                detector = await pipeline('text-classification', MODEL_ID, {
                    progress_callback: (p) => {
                        if (p.status === 'progress') {
                            btnText.innerText = `Загрузка: ${Math.round(p.progress)}%`;
                        }
                    }
                });

                modelStatus.innerText = "Модель готова (DeBERTa/RoBERTa Local)";
                btnText.innerText = "Проверить на ИИ";
                checkBtn.disabled = false;
                checkBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            } catch (err) {
                console.error(err);
                modelStatus.innerHTML = `<span class="text-red-500">Ошибка: ${err.message}</span>`;
                btnText.innerText = "Ошибка загрузки";
            }
        }

        checkBtn.onclick = async () => {
            const text = document.getElementById('userInput').value.trim();
            if (text.length < 50) return alert("Текст слишком короткий!");

            btnText.innerText = "Анализируем...";
            document.getElementById('btnLoader').classList.remove('hidden');
            checkBtn.disabled = true;

            try {
                const output = await detector(text);
                const result = output[0];
                
                // Обработка меток (Real/Fake)
                const isAI = result.label === 'Fake' || result.label === 'LABEL_1';
                const score = (result.score * 100).toFixed(1);

                const card = document.getElementById('resultCard');
                const scoreDisplay = document.getElementById('scoreText');
                const verdictDisplay = document.getElementById('verdict');

                card.style.opacity = "1";
                scoreDisplay.innerText = score + "%";
                
                if (isAI && result.score > 0.7) {
                    verdictDisplay.innerText = "🚨 Сгенерировано ИИ";
                    verdictDisplay.className = "text-lg font-bold text-red-500";
                } else if (isAI || result.score > 0.4) {
                    verdictDisplay.innerText = "⚠️ Подозрительно";
                    verdictDisplay.className = "text-lg font-bold text-yellow-500";
                } else {
                    verdictDisplay.innerText = "✅ Человек";
                    verdictDisplay.className = "text-lg font-bold text-green-500";
                }

            } catch (e) {
                alert("Ошибка анализа: " + e.message);
            } finally {
                btnText.innerText = "Проверить на ИИ";
                document.getElementById('btnLoader').classList.add('hidden');
                checkBtn.disabled = false;
            }
        };

        init();
    </script>
</body>
</html>
