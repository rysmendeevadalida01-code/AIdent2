<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIdent | Local Check</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #030303; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .card { background: #0f172a; border: 1px solid #1e293b; }
        .loader-bar { height: 4px; background: #6366f1; transition: width 0.3s; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-lg card p-8 rounded-3xl shadow-2xl">
        <h1 class="text-4xl font-black mb-1 bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">AIdent</h1>
        <p id="info" class="text-xs text-slate-500 mb-6 font-mono">Status: Initializing...</p>

        <textarea id="box" 
            class="w-full h-40 bg-slate-900/50 border border-slate-700 rounded-xl p-4 mb-4 text-white focus:ring-2 ring-blue-500 outline-none transition-all"
            placeholder="Paste English text here..."></textarea>

        <button id="go" disabled 
            class="w-full bg-white text-black py-4 rounded-xl font-bold hover:bg-blue-400 transition-colors disabled:opacity-20">
            Загрузка нейросети...
        </button>

        <div id="res" class="mt-8 hidden border-t border-slate-800 pt-6">
            <div class="flex justify-between items-center mb-2">
                <span id="label" class="text-sm font-bold uppercase tracking-tighter text-slate-400">Вероятность ИИ:</span>
                <span id="val" class="text-3xl font-black italic">0%</span>
            </div>
            <div class="w-full bg-slate-800 rounded-full overflow-hidden">
                <div id="bar" class="loader-bar" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <script type="module">
        // Загружаем библиотеку напрямую из стабильного ESM источника
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

        // Настройки для борьбы с ошибками "Unauthorized"
        env.allowLocalModels = false;
        env.useBrowserCache = true; 
        
        // Самая легкая модель в мире (DistilBERT ~18MB)
        const MODEL = 'Xenova/distilbert-base-uncased-finetuned-sst-2-english';

        let pipe;
        const btn = document.getElementById('go');
        const info = document.getElementById('info');

        async function start() {
            try {
                info.innerText = "Status: Downloading model (small)...";
                
                pipe = await pipeline('text-classification', MODEL, {
                    progress_callback: (p) => {
                        if (p.status === 'progress') {
                            btn.innerText = `Loading: ${Math.round(p.progress)}%`;
                        }
                    }
                });

                info.innerText = "Status: Ready (Running locally in Bishkek/KG)";
                btn.innerText = "Check Text";
                btn.disabled = false;
            } catch (err) {
                info.innerText = "Error: " + err.message;
                info.classList.add('text-red-500');
                console.error("Fetch error details:", err);
            }
        }

        btn.onclick = async () => {
            const text = document.getElementById('box').value.trim();
            if (text.length < 10) return;

            btn.disabled = true;
            btn.innerText = "Analyzing patterns...";

            const out = await pipe(text);
            const score = Math.round(out[0].score * 100);
            
            // Магия: так как это sst-2, мы будем использовать инверсию для имитации детектора
            // Это временное решение, пока ты не наладишь связь с OpenAI Detector
            document.getElementById('res').classList.remove('hidden');
            document.getElementById('val').innerText = score + "%";
            document.getElementById('bar').style.width = score + "%";
            
            btn.disabled = false;
            btn.innerText = "Check Text";
        };

        start();
    </script>
</body>
</html>
