<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Ghost Detector | Анализ текста</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050509;
            color: #ffffff;
            overflow-x: hidden;
        }
        .glass {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-text {
            background: linear-gradient(180deg, #fff 0%, #6b7280 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .circle-progress {
            transition: stroke-dasharray 1s ease-in-out;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 0.5; }
        }
        .blob {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(126, 34, 206, 0.2) 0%, rgba(0, 0, 0, 0) 70%);
            filter: blur(80px);
            z-index: -1;
        }
    </style>
</head>
<body class="p-6">

    <div class="blob" style="top: -100px; left: -100px;"></div>
    <div class="blob" style="bottom: -100px; right: -100px; background: radial-gradient(circle, rgba(30, 58, 138, 0.2) 0%, rgba(0, 0, 0, 0) 70%);"></div>

    <div class="max-w-5xl mx-auto py-12">
        <header class="text-center mb-16">
            <h1 class="text-6xl font-extrabold tracking-tighter gradient-text mb-4">AI VERDICT</h1>
            <p class="text-gray-400 text-lg">Детектор искусственного интеллекта на основе лингвистических паттернов</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2">
                <div class="glass p-2 rounded-3xl shadow-2xl">
                    <textarea id="textInput" placeholder="Вставьте текст для анализа (минимум 100 символов)..." 
                        class="w-full h-80 bg-transparent p-6 text-lg outline-none resize-none placeholder:text-gray-700"></textarea>
                </div>
                <div class="flex justify-center mt-8">
                    <button onclick="analyzeText()" id="btnAction" class="bg-white text-black px-12 py-4 rounded-full font-bold hover:bg-purple-500 hover:text-white transition-all duration-300 transform hover:scale-105">
                        Проверить текст
                    </button>
                </div>
            </div>

            <div id="resultBlock" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-700">
                <div class="glass p-8 rounded-3xl border-purple-500/30">
                    <h2 class="text-center text-sm uppercase tracking-widest text-gray-500 mb-6">Результат анализа</h2>
                    
                    <div class="relative w-48 h-48 mx-auto mb-8">
                        <svg class="w-full h-full" viewBox="0 0 36 36">
                            <path class="text-gray-800" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-width="2.5"></path>
                            <path id="progressBar" class="text-purple-500 circle-progress" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"></path>
                        </svg>
                        <div class="absolute inset-0 flex flex-col items-center justify-center">
                            <span id="percentText" class="text-5xl font-black italic">0%</span>
                        </div>
                    </div>

                    <div id="verdictText" class="text-center text-xl font-semibold mb-6">--</div>

                    <div class="space-y-4 border-t border-white/10 pt-6">
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-500">Сложность (Perplexity):</span>
                            <span id="metricPerp" class="font-mono text-purple-400">0</span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-500">Ритмичность:</span>
                            <span id="metricBurst" class="font-mono text-blue-400">0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function analyzeText() {
            const text = document.getElementById('textInput').value;
            const btn = document.getElementById('btnAction');
            const resultBlock = document.getElementById('resultBlock');

            if (text.length < 50) {
                alert("Текст слишком короткий для точного анализа!");
                return;
            }

            btn.innerHTML = "Сканирование...";
            btn.disabled = true;

            // Логика анализа
            setTimeout(() => {
                const words = text.trim().split(/\s+/);
                const sentences = text.split(/[.!?]+/).filter(s => s.length > 0);
                
                // 1. Burstiness (разница длин предложений)
                const lens = sentences.map(s => s.trim().split(/\s+/).length);
                const burstiness = Math.max(...lens) - Math.min(...lens);
                
                // 2. Сложность слов
                const avgWordLen = text.length / words.length;

                // 3. Считаем шанс ИИ
                let aiChance = 45;
                if (burstiness < 5) aiChance += 30; // Монотонно = ИИ
                if (avgWordLen > 6) aiChance += 15; // Длинные слова = ИИ
                
                aiChance = Math.min(98, Math.max(2, aiChance + Math.floor(Math.random() * 10)));

                // Вывод результатов
                document.getElementById('percentText').innerText = aiChance + "%";
                document.getElementById('progressBar').setAttribute('stroke-dasharray', `${aiChance}, 100`);
                document.getElementById('metricPerp').innerText = (avgWordLen * 1.5).toFixed(1);
                document.getElementById('metricBurst').innerText = burstiness;
                
                const verdict = document.getElementById('verdictText');
                if (aiChance > 60) {
                    verdict.innerText = "🚨 Вероятно, РОБОТ";
                    verdict.style.color = "#f87171";
                } else {
                    verdict.innerText = "✅ Написано ЧЕЛОВЕКОМ";
                    verdict.style.color = "#4ade80";
                }

                resultBlock.classList.remove('hidden');
                btn.innerHTML = "Проверить текст";
                btn.disabled = false;
            }, 1000);
        }
    </script>
</body>
</html>
