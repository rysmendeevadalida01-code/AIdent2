      <script>
        const API_URL = "https://api-inference.huggingface.co/models/openai-community/roberta-base-openai-detector";
        // ВАЖНО: Вставь сюда свой токен, который ты получил на Hugging Face
        const API_TOKEN = "ТВОЙ_ТОКЕН_ЗДЕСЬ"; 

        const checkBtn = document.getElementById('checkBtn');
        const userInput = document.getElementById('userInput');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');
        const resultCard = document.getElementById('resultCard');
        const scoreCircle = document.getElementById('scoreCircle');
        const scoreText = document.getElementById('scoreText');
        const verdict = document.getElementById('verdict');
        const aiScoreLabel = document.getElementById('aiScore');
        const humanScoreLabel = document.getElementById('humanScore');
        const errorMsg = document.getElementById('errorMessage');

        async function queryModel(text, retries = 3) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(API_URL, {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${API_TOKEN}`,
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({ inputs: text })
                    });

                    const result = await response.json();

                    // Если модель еще загружается, Hugging Face вернет 'estimated_time'
                    if (result.error && result.error.includes("currently loading")) {
                        const waitTime = Math.ceil(result.estimated_time || 10);
                        btnText.innerText = `Загрузка модели (${waitTime}s)...`;
                        await new Promise(resolve => setTimeout(resolve, 5000)); // Ждем 5 сек и пробуем снова
                        continue;
                    }

                    if (!response.ok) throw new Error(result.error || "Ошибка API");
                    return result;

                } catch (err) {
                    if (i === retries - 1) throw err;
                    await new Promise(resolve => setTimeout(resolve, 2000));
                }
            }
        }

        checkBtn.addEventListener('click', async () => {
            const text = userInput.value.trim();
            if (text.length < 50) {
                alert("Текст слишком короткий. Для точного анализа RoBERTa нужно хотя бы 50 символов.");
                return;
            }

            errorMsg.classList.add('hidden');
            btnText.innerText = "Связь с сервером...";
            btnLoader.classList.remove('hidden');
            checkBtn.disabled = true;

            try {
                const data = await queryModel(text);
                
                // Обработка данных
                const scores = data[0];
                const fake = scores.find(s => s.label === 'Fake' || s.label === 'LABEL_1').score;
                const real = scores.find(s => s.label === 'Real' || s.label === 'LABEL_0').score;

                const aiPercent = (fake * 100).toFixed(1);
                const humanPercent = (real * 100).toFixed(1);

                // UI Update
                resultCard.style.opacity = "1";
                scoreText.innerText = aiPercent + "%";
                scoreCircle.setAttribute('stroke-dasharray', `${aiPercent} 100`);
                aiScoreLabel.innerText = aiPercent + "%";
                humanScoreLabel.innerText = humanPercent + "%";

                if (fake > 0.6) {
                    verdict.innerText = "🚨 Сгенерировано ИИ";
                    verdict.className = "text-xl font-bold mb-4 italic text-red-500";
                } else {
                    verdict.innerText = "✅ Написано человеком";
                    verdict.className = "text-xl font-bold mb-4 italic text-green-500";
                }

            } catch (error) {
                console.error("Full Error:", error);
                errorMsg.innerText = "Ошибка: " + error.message + ". Проверьте интернет и токен API.";
                errorMsg.classList.remove('hidden');
            } finally {
                btnText.innerText = "Проверить на ИИ";
                btnLoader.classList.add('hidden');
                checkBtn.disabled = false;
            }
        });
    </script>
